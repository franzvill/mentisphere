services:
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    volumes:
      - mariadb-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MEDIAWIKI_DB_NAME}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:7.17.18
    restart: unless-stopped
    volumes:
      - es-data:/usr/share/elasticsearch/data
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  mediawiki:
    image: mediawiki:1.43
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./mediawiki/LocalSettings.php:/var/www/html/LocalSettings.php
      - ./mediawiki/skins/citizen:/var/www/html/skins/Citizen
      - ./mediawiki/extensions/Cargo:/var/www/html/extensions/Cargo
      - ./mediawiki/extensions/Scribunto:/var/www/html/extensions/Scribunto
      - ./mediawiki/extensions/CirrusSearch:/var/www/html/extensions/CirrusSearch
      - ./mediawiki/extensions/Elastica:/var/www/html/extensions/Elastica
      - ./mediawiki/extensions/MentiSphereChat:/var/www/html/extensions/MentiSphereChat
      - ./mediawiki/logo-icon.png:/var/www/html/resources/assets/mentisphere-logo-icon.png:ro
      - ./mediawiki/logo-1x.png:/var/www/html/resources/assets/mentisphere-logo-1x.png:ro
      - ./mediawiki/logo-2x.png:/var/www/html/resources/assets/mentisphere-logo-2x.png:ro
      - wiki-images:/var/www/html/images
    depends_on:
      mariadb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      MEDIAWIKI_DB_HOST: mariadb
      MEDIAWIKI_DB_NAME: ${MEDIAWIKI_DB_NAME}
      MEDIAWIKI_DB_USER: root
      MEDIAWIKI_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mentisphere_chat
      POSTGRES_USER: mentisphere
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentisphere -d mentisphere_chat"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-service:
    build: ./chat-service
    restart: unless-stopped
    volumes:
      - ./chat-widget/dist:/app/public/assets
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mentisphere:${PG_PASSWORD}@postgres:5432/mentisphere_chat
      MEDIAWIKI_API_URL: http://mediawiki:80/api.php
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CHAT_SERVICE_SECRET: ${CHAT_SERVICE_SECRET}

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mediawiki
      - chat-service

volumes:
  mariadb-data:
  es-data:
  wiki-images:
  postgres-data:
