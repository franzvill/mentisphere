events {
    worker_connections 1024;
}

http {
    upstream mediawiki {
        server mediawiki:80;
    }

    upstream chat_service {
        server chat-service:3000;
    }

    # ── HTTP: ACME challenge + redirect everything else to HTTPS ──
    server {
        listen 80;
        server_name mentisphere.wiki www.mentisphere.wiki 76.13.146.118 _;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        location / {
            return 301 https://mentisphere.wiki$request_uri;
        }
    }

    # ── HTTPS: redirect www → apex ──
    server {
        listen 443 ssl;
        http2 on;
        server_name www.mentisphere.wiki;

        ssl_certificate     /etc/letsencrypt/live/mentisphere.wiki/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mentisphere.wiki/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        return 301 https://mentisphere.wiki$request_uri;
    }

    # ── HTTPS: main app on apex ──
    server {
        listen 443 ssl default_server;
        http2 on;
        server_name mentisphere.wiki;

        ssl_certificate     /etc/letsencrypt/live/mentisphere.wiki/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mentisphere.wiki/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS — once you're sure HTTPS is stable, this tells browsers to never go HTTP again
        add_header Strict-Transport-Security "max-age=15768000" always;

        client_max_body_size 10m;

        # Chat service API (used by /chat-widget on agent pages)
        location /chat-api/ {
            proxy_pass http://chat_service/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        # Chat widget static assets
        location /chat-assets/ {
            proxy_pass http://chat_service/assets/;
            proxy_set_header Host $host;
            expires 1h;
        }

        # Central chat UI
        location /chat {
            proxy_pass http://chat_service/chat;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # /pulse brain visualization (chat-service)
        location /pulse {
            proxy_pass http://chat_service/pulse;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Brain backdrop image (chat-service public/)
        location = /brain.png {
            proxy_pass http://chat_service/brain.png;
            proxy_set_header Host $host;
            expires 1d;
        }

        # Chat service API (Next.js routes used by /chat frontend)
        location /api/ {
            proxy_pass http://chat_service/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
        }

        # Next.js static assets for chat UI
        location /_next/ {
            proxy_pass http://chat_service/_next/;
            proxy_set_header Host $host;
        }

        # Short URLs: /wiki/Page_Name
        location /wiki/ {
            rewrite ^/wiki/(.*)$ /index.php?title=$1 last;
        }

        # MediaWiki — everything else
        location / {
            proxy_pass http://mediawiki;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
