events {
    worker_connections 1024;
}

http {
    upstream mediawiki {
        server mediawiki:80;
    }

    upstream chat_service {
        server chat-service:3000;
    }

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 10m;

        # Chat service API
        location /chat-api/ {
            proxy_pass http://chat_service/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        # Chat widget static assets
        location /chat-assets/ {
            proxy_pass http://chat_service/assets/;
            proxy_set_header Host $host;
            expires 1h;
        }

        # Central chat UI
        location /chat {
            proxy_pass http://chat_service/chat;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Chat service API (Next.js routes used by /chat frontend)
        location /api/ {
            proxy_pass http://chat_service/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
        }

        # Next.js static assets for chat UI
        location /_next/ {
            proxy_pass http://chat_service/_next/;
            proxy_set_header Host $host;
        }

        # Short URLs: /wiki/Page_Name
        location /wiki/ {
            rewrite ^/wiki/(.*)$ /index.php?title=$1 last;
        }

        # MediaWiki — everything else
        location / {
            proxy_pass http://mediawiki;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
